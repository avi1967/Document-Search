version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doc_search_backend
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    environment:
      - RAW_DOCS_PATH=data/raw_docs
      - VECTOR_DB_PATH=data/vector_index
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: doc_search_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  backend_data:
